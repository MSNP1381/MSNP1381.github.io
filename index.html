<!DOCTYPE html>
<html>
<head>
	<title>My Video Grid</title>
	<style>
		.video-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
			grid-gap: 20px;
		}
		.video {
			position: relative;
			padding-bottom: 56.25%;
			height: 0;
			overflow: hidden;
		}
		.video iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
	<div class="video-grid">
		<div class="video">
			<iframe src="VIDEO_URL"></iframe>
		</div>
		<div class="video">
			<iframe src="VIDEO_URL"></iframe>
		</div>
		<!-- Add more videos here -->
	</div>
</body>
</html>
